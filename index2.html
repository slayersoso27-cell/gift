<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Gift - Asel</title>

<style>
body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top,#0b0b1a,#000);
font-family: Arial, sans-serif;
color:white;
perspective: 1400px;
}

canvas{
position:absolute;
top:0;
left:0;
}

.scene{
position: relative;
transform-style: preserve-3d;
z-index:2;
}

.card{
width:300px;
height:400px;
transform-style:preserve-3d;
transition:1.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
cursor:pointer;
position:relative;
}

.card.open{
transform: rotateY(180deg) scale(1.05);
}

.side{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:22px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

.front{
background: linear-gradient(135deg,#ffe29f,#ff9671);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border: 2px solid rgba(255,255,255,0.3);
}

.front h2{
color:#222;
font-size: 1.5rem;
}

.back{
transform:rotateY(180deg);
background: linear-gradient(135deg,#141e30,#243b55);
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
padding:40px 20px;
text-align:center;
border: 2px solid rgba(255, 211, 110, 0.3);
}

.heart{
font-size:55px;
margin-bottom: 10px;
animation: float 2s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.btn{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:12px;
background:#ffd36e;
color: #141e30;
cursor:pointer;
font-weight:bold;
font-size: 1rem;
box-shadow: 0 5px 15px rgba(255, 211, 110, 0.4);
transition: 0.3s;
z-index: 10;
}

.btn:hover {
transform: scale(1.05);
background: #fff;
}

#text{
margin-top:15px;
min-height:50px;
font-size: 1.1rem;
line-height: 1.6;
font-weight: bold;
}

.glow{
font-size: 2rem;
margin: 5px 0;
text-shadow:0 0 15px #ffd36e;
color: #ffd36e;
}

.bouquet-3d-container {
position: absolute;
bottom: -300px;
left: 50%;
width: 260px;
height: 280px;
opacity: 0;
transform: translateX(-50%) translateZ(0px) scale(0.2) rotateX(0deg);
transform-style: preserve-3d;
transition: all 1.5s cubic-bezier(0.075, 0.82, 0.165, 1);
pointer-events: none;
z-index: 20;
}

.bouquet-3d-container.show {
bottom: -60px;
opacity: 1;
transform: translateX(-50%) translateZ(130px) scale(1.15) rotateX(38deg);
animation: bouquetFloat 4s infinite ease-in-out alternate;
}

@keyframes bouquetFloat {
0% { transform: translateX(-50%) translateZ(130px) scale(1.15) rotateX(38deg) rotateY(-3deg); }
100% { transform: translateX(-50%) translateZ(140px) scale(1.18) rotateX(41deg) rotateY(3deg); }
}

.wrapping-paper {
position: absolute;
width: 100%;
height: 100%;
transform-style: preserve-3d;
}

.paper-cone {
position: absolute;
bottom: 0;
left: 5%;
width: 90%;
height: 90%;
background: linear-gradient(145deg, #c3a683, #917553);
clip-path: polygon(50% 15%, 100% 45%, 80% 100%, 20% 100%, 0% 45%);
transform-origin: center bottom;
box-shadow: inset 0 -20px 30px rgba(0,0,0,0.5);
}
.paper-cone.back-layer { transform: translateZ(-15px) scale(1.03); background: #7d6240; }
.paper-cone.left-wing { transform: rotateY(-20deg) translateZ(5px) rotateZ(-5deg); }
.paper-cone.right-wing { transform: rotateY(20deg) translateZ(5px) rotateZ(6deg); }

.golden-bow {
position: absolute;
bottom: 15px; left: 50%;
width: 60px; height: 16px;
background: linear-gradient(to right, #b49126, #ffd36e, #b49126);
transform: translateX(-50%) translateZ(30px);
border-radius: 4px;
box-shadow: 0 5px 10px rgba(0,0,0,0.4);
}
.golden-bow::before, .golden-bow::after {
content: ''; position: absolute; top: -6px;
width: 26px; height: 24px;
border: 4px solid #ffd36e; border-radius: 50%;
}
.golden-bow::before { left: -14px; transform: rotate(-20deg); }
.golden-bow::after { right: -14px; transform: rotate(20deg); }

.foliage {
position: absolute;
width: 100%; height: 75%;
top: 20px;
transform-style: preserve-3d;
}

.leaf {
position: absolute;
background: linear-gradient(to top, #143212, #2d5a27);
border-radius: 0 70% 0 70%;
transform-origin: center center;
}

.gypsophila {
position: absolute;
width: 6px; height: 6px;
background: #fff;
border-radius: 50%;
box-shadow: 0 0 5px #fff, 10px 8px 0 #fff, -8px 12px 0 #fffdf0;
}

.flowers-grid {
position: absolute;
width: 100%; height: 100%;
transform-style: preserve-3d;
}

.flower-3d {
position: absolute;
width: 80px;
height: 80px;
transform-style: preserve-3d;
}

.f-center { top: 40px;  left: 90px;  transform: translateZ(35px) rotateX(-10deg); }
.f-top    { top: -10px; left: 90px;  transform: translateZ(15px) rotateX(-5deg); }
.f-left   { top: 20px;  left: 20px;  transform: translateZ(25px) rotateY(15deg) rotateX(-10deg); }
.f-right  { top: 20px;  left: 160px; transform: translateZ(25px) rotateY(-15deg) rotateX(-10deg); }
.f-bottom { top: 95px;  left: 90px;  transform: translateZ(30px) rotateX(-20deg); }

.flower-core {
position: absolute;
top: 22px; left: 22px; width: 36px; height: 36px;
background: radial-gradient(circle, #1a0d02 0%, #3a1e05 70%, #110801 100%);
border-radius: 50%;
z-index: 5;
transform: translateZ(8px);
box-shadow: inset 0 0 6px #000, 0 3px 6px rgba(0,0,0,0.4);
border: 1.5px dashed #5c3a16;
}

.petals-container {
position: relative;
width: 100%;
height: 100%;
transform-style: preserve-3d;
}

.petal-3d {
position: absolute;
top: 0; left: 33px;
width: 14px; height: 40px;
background: linear-gradient(to top, #d97706 0%, #fbbf24 70%, #fff493 100%);
border-radius: 50% 50% 30% 30%;
transform-origin: center bottom;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="scene">
<div class="card" id="card">

<div class="side front">
<h2>🎁 اضغط لفتح الهدية</h2>
</div>

<div class="side back">
<div class="heart">💛</div>

<h3 class="glow">أسل</h3>

<div id="text"></div>

<button class="btn" onclick="showBouquet(event)">مفاجأة 🌻</button>

<div class="bouquet-3d-container" id="bouquet">
    <div class="wrapping-paper">
        <div class="paper-cone back-layer"></div>
        <div class="paper-cone left-wing"></div>
        <div class="paper-cone right-wing"></div>
    </div>

    <div class="foliage" id="foliageLayer"></div>

    <div class="flowers-grid">
        <div class="flower-3d f-center"><div class="flower-core"></div><div class="petals-container"></div></div>
        <div class="flower-3d f-top"><div class="flower-core"></div><div class="petals-container"></div></div>
        <div class="flower-3d f-left"><div class="flower-core"></div><div class="petals-container"></div></div>
        <div class="flower-3d f-right"><div class="flower-core"></div><div class="petals-container"></div></div>
        <div class="flower-3d f-bottom"><div class="flower-core"></div><div class="petals-container"></div></div>
    </div>

    <div class="golden-bow"></div>
</div>
</div>
</div>
</div>

<script>
const card = document.getElementById("card");
card.addEventListener("click", ()=>{
card.classList.add("open");
startMusic();
typeText();
});

const message = "يا ألطف المخلوقات 💛\nإنتِ تستاهلي كل الورود في هذا العالم 🌻";
let i = 0;
function typeText(){
const el = document.getElementById("text");
el.innerHTML = "";
i = 0;
let interval = setInterval(()=>{
if(i < message.length){
el.innerHTML += message[i] === "\n" ? "<br>" : message[i];
i++;
}else{
clearInterval(interval);
}
},60);
}

const petalContainers = document.querySelectorAll('.petals-container');
const petalsCount = 18;
petalContainers.forEach(container => {
    for (let j = 0; j < petalsCount; j++) {
        const angle = (360 / petalsCount) * j;
        const petal = document.createElement('div');
        petal.classList.add('petal-3d');
        const tilt = 12 + (j % 2 * 6);
        const zOffset = (j % 2 === 0) ? 2 : 4;
        petal.style.transform = `rotateZ(${angle}deg) rotateX(${tilt}deg) translateZ(${zOffset}px)`;
        container.appendChild(petal);
    }
});

const foliageLayer = document.getElementById('foliageLayer');
for(let k=0; k<10; k++) {
    const leaf = document.createElement('div');
    leaf.classList.add('leaf');
    leaf.style.width = `${15 + Math.random()*10}px`;
    leaf.style.height = `${20 + Math.random()*15}px`;
    leaf.style.left = `${15 + Math.random()*70}%`;
    leaf.style.top = `${15 + Math.random()*50}%`;
    leaf.style.transform = `rotate(${Math.random()*360}deg) translateZ(${4 + Math.random()*10}px)`;
    foliageLayer.appendChild(leaf);
}
for(let k=0; k<8; k++) {
    const whiteFlower = document.createElement('div');
    whiteFlower.classList.add('gypsophila');
    whiteFlower.style.left = `${20 + Math.random()*60}%`;
    whiteFlower.style.top = `${20 + Math.random()*45}%`;
    whiteFlower.style.transform = `translateZ(10px)`;
    foliageLayer.appendChild(whiteFlower);
}

function showBouquet(e){
e.stopPropagation();
document.getElementById("bouquet").classList.add("show");
}

let audioStarted = false;
function startMusic(){
if(audioStarted) return;
audioStarted = true;
const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctx = new AudioContext();
function note(freq, time){
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = "sine";
osc.frequency.value = freq;
gain.gain.setValueAtTime(0.0001, time);
gain.gain.exponentialRampToValueAtTime(0.08, time+0.5);
gain.gain.exponentialRampToValueAtTime(0.0001, time+2);
osc.connect(gain);
gain.connect(ctx.destination);
osc.start(time);
osc.stop(time+2);
}
const now = ctx.currentTime;
note(261.6, now); note(329.6, now+1); note(392.0, now+2); note(523.3, now+3);
note(493.9, now+4); note(392.0, now+5); note(329.6, now+6);
}

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let stars = Array(120).fill().map(()=>({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2, d:Math.random()*1}));
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y += s.d;
if(s.y > canvas.height){ s.y = 0; s.x = Math.random()*canvas.width; }
}
requestAnimationFrame(draw);
}
draw();
window.addEventListener("resize", ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
