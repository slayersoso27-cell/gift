<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لبيسان</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8010;
            --bg-color: #0c0a07;
            --box-color: #f5f0e6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #221a12 0%, #050403 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1100px;
        }

        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
        }

        .header-title {
            border: 1px solid var(--gold);
            padding: 8px 35px;
            border-radius: 4px;
            font-size: 1.1rem;
            color: var(--gold);
            background: rgba(12, 10, 7, 0.9);
            z-index: 100;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .scene {
            position: relative;
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transform: rotateX(12deg) rotateY(-5deg);
            z-index: 10;
        }

        /* الصندوق ثلاثي الأبعاد */
        .gift-box-3d {
            position: relative;
            width: 200px;
            height: 180px;
            transform-style: preserve-3d;
            transform: translateY(60px);
            transition: transform 1.5s ease-in-out;
        }

        .box-face {
            position: absolute;
            background-color: var(--box-color);
            border: 1px solid #e3dac6;
        }

        .box-face.front  { width: 200px; height: 180px; transform: translateZ(100px); }
        .box-face.back   { width: 200px; height: 180px; transform: rotateY(180deg) translateZ(100px); background: #eae3d2; }
        .box-face.left   { width: 200px; height: 180px; transform: rotateY(-90deg) translateZ(100px); background: #e3dac6; }
        .box-face.right  { width: 200px; height: 180px; transform: rotateY(90deg) translateZ(100px); background: #eee7d7; }
        .box-face.bottom { width: 200px; height: 200px; transform: rotateX(-90deg) translateZ(90px); background: #cdbfa0; box-shadow: 0 35px 50px rgba(0,0,0,0.8); }

        .ribbon-v {
            position: absolute;
            top: 0; left: calc(50% - 15px); width: 30px; height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
        }

        /* غطاء الصندوق */
        .lid-3d {
            position: absolute;
            width: 208px;
            height: 35px;
            top: -2px; left: -4px;
            transform-style: preserve-3d;
            transform-origin: center top -100px;
            transition: transform 1.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 20;
        }

        .lid-face { position: absolute; background-color: var(--box-color); border: 1px solid #ebdcb9; }
        .lid-face.top    { width: 208px; height: 208px; transform: rotateX(90deg) translateZ(104px); }
        .lid-face.front  { width: 208px; height: 35px; transform: translateZ(104px); }
        .lid-face.back   { width: 208px; height: 35px; transform: rotateY(180deg) translateZ(104px); }
        .lid-face.left   { width: 208px; height: 35px; transform: rotateY(-90deg) translateZ(104px); }
        .lid-face.right  { width: 208px; height: 35px; transform: rotateY(90deg) translateZ(104px); }
        
        .lid-ribbon { position: absolute; top: 0; left: calc(50% - 15px); width: 30px; height: 100%; background: var(--gold); }

        .gift-box-3d.open .lid-3d {
            transform: rotateX(-115deg) translateY(-55px);
        }

        .box-label {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; border: 1.5px solid var(--gold);
            padding: 5px 20px; border-radius: 4px;
            color: #4a3611; font-weight: bold; text-align: center; font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: opacity 0.5s ease;
        }
        .box-label span { display: block; font-size: 1.1rem; color: var(--dark-gold); }

        /* كارد التهنئة الأساسي - إزاحة تامة ومثالية لليسار */
        .card {
            position: absolute;
            width: 210px;
            height: 280px;
            background: linear-gradient(135deg, #fffdfa 0%, #f7f2e5 100%);
            border: 3px double var(--gold);
            border-radius: 12px;
            color: #3a2e16;
            padding: 25px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 60;
            transform: translateZ(0px) translateY(20px) scale(0.1);
            opacity: 0;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .gift-box-3d.open .card {
            transform: translateZ(120px) translateY(-140px) scale(1.1);
            opacity: 1;
            pointer-events: auto;
        }

        .card.shift-aside {
            transform: translateZ(50px) translateY(-130px) translateX(-145px) scale(0.9) rotateY(-22deg) rotateZ(-4deg) !important;
            box-shadow: -15px 25px 45px rgba(0,0,0,0.45);
        }

        .card h2 { font-size: 2rem; color: var(--dark-gold); font-weight: bold; }
        .card p { font-size: 1.05rem; line-height: 1.6; font-weight: 600; color: #4a3f2c; }
        .card-heart { color: var(--gold); font-size: 1.3rem; }

        /* ================= حاوية باقة الورد الاحترافية الكبرى المستوحاة من صورتك ================= */
        .bouquet-3d-container {
            position: absolute;
            top: 20px; left: 10px;
            width: 220px;
            height: 240px;
            z-index: 45;
            opacity: 0;
            transform: translateZ(0px) translateY(0px) scale(0.1);
            transform-style: preserve-3d;
            transition: all 2.2s cubic-bezier(0.075, 0.82, 0.165, 1);
            pointer-events: none;
        }

        /* تأثير الصعود والدوران الطافي المحاكي للواقع البصري */
        .bouquet-3d-container.bloom {
            opacity: 1;
            transform: translateZ(80px) translateY(-170px) translateX(40px) scale(1.3);
            animation: bouquetFloat 5s infinite ease-in-out alternate;
        }

        @keyframes bouquetFloat {
            0% { transform: translateZ(80px) translateY(-170px) translateX(40px) scale(1.3) rotateY(0deg); }
            100% { transform: translateZ(80px) translateY(-182px) translateX(45px) scale(1.33) rotateY(12deg) rotateX(4deg); }
        }

        /* ورق التغليف الفخم (Kraft Paper) المحيط بالباقة */
        .wrapping-paper {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            z-index: 1;
        }

        /* أوراق التغليف الخلفية والجانبية المدببة مثل الصورة */
        .paper-cone {
            position: absolute;
            bottom: 20px; left: 10%;
            width: 80%; height: 85%;
            background: linear-gradient(145deg, #c3a683, #a2845e);
            clip-path: polygon(50% 0%, 100% 40%, 85% 100%, 15% 100%, 0% 40%);
            transform-origin: center bottom;
            box-shadow: inset 0 -20px 30px rgba(0,0,0,0.3);
        }
        .paper-cone.back-layer { transform: translateZ(-15px) scale(1.05); background: #8e7250; }
        .paper-cone.left-wing { transform: rotateY(-30deg) translateZ(10px) rotateZ(-10deg); opacity: 0.95; }
        .paper-cone.right-wing { transform: rotateY(30deg) translateZ(10px) rotateZ(10deg); opacity: 0.95; }

        /* شريطة الساتان الذهبية وعقدة الفراشة بالأسفل المدمجة بالباقة */
        .golden-ribbon-tie {
            position: absolute;
            bottom: 25px; left: 50%;
            width: 50px; height: 16px;
            background: linear-gradient(to right, #b49126, #f1d475, #b49126);
            transform: translateX(-50%) translateZ(40px);
            border-radius: 4px;
            z-index: 25;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .golden-ribbon-tie::before, .golden-ribbon-tie::after {
            content: ''; position: absolute; top: -6px;
            width: 30px; height: 26px;
            border: 4px solid #e1bd4f; border-radius: 50%;
        }
        .golden-ribbon-tie::before { left: -20px; transform: rotate(-25deg); }
        .golden-ribbon-tie::after { right: -20px; transform: rotate(25deg); }

        /* حشوة الأزهار والخصوبة الداخلية (الأوراق الخضراء والجبسوفيلا البيضاء الصغيرة) */
        .foliage-layer {
            position: absolute;
            width: 100%; height: 75%;
            top: 10px;
            transform-style: preserve-3d;
            z-index: 2;
        }
        .green-leaf {
            position: absolute;
            background: linear-gradient(to top, #143212, #2d5a27);
            border-radius: 0 70% 0 70%;
            transform-origin: center center;
        }
        /* نقاط بيضاء صغيرة لتمثيل ورد الـ Baby's Breath الناعم الموزع بكثافة في صورتك */
        .white-baby-breath {
            position: absolute;
            width: 5px; height: 5px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 4px #fff, 8px 12px 0 #fff, -10px 5px 0 #fffdf0;
        }

        /* أزهار عباد الشمس الاحترافية الموزعة هندسياً وعشوائياً */
        .flowers-grid {
            position: absolute;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            z-index: 5;
        }

        .single-flower-3d { position: absolute; transform-style: preserve-3d; }
        
        /* ضبط أماكن الزهرات الخمس المتطابقة تماماً مع باقة الصورة المشحونة للعمق */
        .fl-center { top: 35px; left: 65px; transform: scale(1.05) translateZ(35px); } /* الزهرة الكبرى بالوسط الواجهة */
        .fl-top    { top: -10px; left: 65px; transform: scale(0.95) rotateX(15deg) translateZ(15px); }
        .fl-left   { top: 25px; left: 15px; transform: scale(0.88) rotateY(20deg) rotateZ(-10deg) translateZ(20px); }
        .fl-right  { top: 25px; left: 115px; transform: scale(0.88) rotateY(-20deg) rotateZ(10deg) translateZ(20px); }
        .fl-bottom { top: 80px; left: 65px; transform: scale(0.9) rotateX(-15deg) translateZ(25px); }

        /* تفاصيل زهرة عباد الشمس الفخمة */
        .flower-center {
            position: absolute;
            top: 25px; left: 25px; width: 44px; height: 44px;
            background: radial-gradient(circle, #1a0d02 0%, #2c1603 50%, #422207 85%, #110801 100%);
            border-radius: 50%;
            z-index: 10;
            transform: translateZ(12px);
            box-shadow: inset 0 0 10px #000, 0 4px 10px rgba(0,0,0,0.4);
            border: 2px dashed #5c3a16; /* يماثل المظهر الخشن لبذور قرص عباد الشمس الداخلي */
        }

        .petals-group { position: relative; width: 94px; height: 94px; transform-style: preserve-3d; }
        
        /* البتلات الاحترافية الكثيفة والمدببة الغنية */
        .petal {
            position: absolute;
            top: 0px; left: 39px; width: 16px; height: 47px;
            background: linear-gradient(to top, #d97706 0%, #f59e0b 20%, #fbbf24 65%, #fff493 100%);
            border-radius: 50% 50% 30% 30%;
            transform-origin: center bottom;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.18);
        }

        /* زر التوجيه للضغط النابض */
        .hint-touch-btn {
            position: absolute;
            bottom: -22px;
            background: #fff; color: var(--dark-gold);
            border: 1px solid var(--gold);
            padding: 6px 20px; border-radius: 20px;
            font-size: 0.85rem; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            opacity: 0; transform: scale(0);
            transition: all 0.5s ease;
            animation: pulseHint 1.8s infinite ease-in-out;
        }

        .gift-box-3d.open .hint-touch-btn { opacity: 1; transform: scale(1); }

        @keyframes pulseHint {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 12px 6px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .action-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none; padding: 15px 55px; border-radius: 30px;
            color: #fff; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            z-index: 110;
        }

        .particle {
            position: absolute; color: var(--gold); font-size: 1.3rem;
            pointer-events: none; opacity: 0; z-index: 90;
            animation: floatUp 2.3s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-250px) scale(1.3) rotate(180deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- صوت موج البحر المباشر الهادئ جداً والطبيعي البوريفايد -->
    <audio id="seaAudio" loop preload="auto">
        <source src="https://www.soundjay.com/nature/sounds/ocean-wave-1.mp3" type="audio/mp3">
    </audio>

    <div class="phone-container">
        <div class="header-title">هدية خاصة لكِ</div>

        <div class="scene">
            <div class="gift-box-3d" id="giftBox">
                <!-- غطاء الصندوق الهندسي الفاخر -->
                <div class="lid-3d">
                    <div class="lid-face top"><div class="lid-ribbon"></div></div>
                    <div class="lid-face front"><div class="lid-ribbon"></div></div>
                    <div class="lid-face back"><div class="lid-ribbon"></div></div>
                    <div class="lid-face left"></div>
                    <div class="lid-face right"></div>
                </div>

                <!-- الهيكل الرئيسي للمكعب -->
                <div class="box-face front">
                    <div class="ribbon-v"></div>
                    <div class="box-label" id="boxLabel">هدية لـ<span>بيسان</span></div>
                </div>
                <div class="box-face back"><div class="ribbon-v"></div></div>
                <div class="box-face left"></div>
                <div class="box-face right"></div>
                <div class="box-face bottom"></div>

                <!-- كارد التهنئة ذو التراجع العميق والآمن لليسار تماماً -->
                <div class="card" id="mainCard" onclick="bloom3DBouquet()">
                    <div class="card-heart">♥</div>
                    <h2>بيسان</h2>
                    <p>بتستاهلي كل الورد<br>يا ألطف المخلوقين</p>
                    <div class="card-heart">♥</div>
                    <div class="hint-touch-btn" id="hintBtn">اضغطي لتأمل باقة الورد 🌊</div>
                </div>

                <!-- الباقة الاحترافية الجديدة بالكامل المطابقة للصورة المرفقة -->
                <div class="bouquet-3d-container" id="bouquet3D">
                    
                    <!-- طبقة أوراق التغليف الـ Kraft الخارجية الفخمة -->
                    <div class="wrapping-paper">
                        <div class="paper-cone back-layer"></div>
                        <div class="paper-cone left-wing"></div>
                        <div class="paper-cone right-wing"></div>
                    </div>

                    <!-- طبقة الحشوة الخضراء والورود البيضاء الصغيرة الجبسوفيلا -->
                    <div class="foliage-layer" id="foliageLayer"></div>

                    <!-- شبكة زهرات عباد الشمس الخمس الاحترافية بتصميم واقعي -->
                    <div class="flowers-grid">
                        <div class="single-flower-3d fl-center"><div class="flower-center"></div><div class="petals-group"></div></div>
                        <div class="single-flower-3d fl-top"><div class="flower-center"></div><div class="petals-group"></div></div>
                        <div class="single-flower-3d fl-left"><div class="flower-center"></div><div class="petals-group"></div></div>
                        <div class="single-flower-3d fl-right"><div class="flower-center"></div><div class="petals-group"></div></div>
                        <div class="single-flower-3d fl-bottom"><div class="flower-center"></div><div class="petals-group"></div></div>
                    </div>

                    <!-- عقدة الساتان السفلية للباقة الفخمة -->
                    <div class="golden-ribbon-tie"></div>
                </div>

            </div>
        </div>

        <button class="action-btn" id="actionBtn" onclick="openGift()">افتح الهدية 🎁</button>
    </div>

    <script>
        // 1. بناء وتوزيع أوراق الشجر والورد الجبسوفيلا الأبيض الصغير لملء الباقة بواقعية كاملة كالصورة
        const foliageLayer = document.getElementById('foliageLayer');
        for (let i = 0; i < 12; i++) {
            const leaf = document.createElement('div');
            leaf.classList.add('green-leaf');
            const w = 15 + Math.random() * 15;
            const h = 25 + Math.random() * 20;
            leaf.style.width = `${w}px`;
            leaf.style.height = `${h}px`;
            leaf.style.left = `${15 + Math.random() * 70}%`;
            leaf.style.top = `${10 + Math.random() * 50}%`;
            leaf.style.transform = `rotate(${Math.random() * 360}deg) translateZ(${5 + Math.random() * 20}px)`;
            foliageLayer.appendChild(leaf);
        }
        for (let i = 0; i < 14; i++) {
            const breath = document.createElement('div');
            breath.classList.add('white-baby-breath');
            breath.style.left = `${20 + Math.random() * 60}%`;
            breath.style.top = `${15 + Math.random() * 55}%`;
            breath.style.transform = `translateZ(${15 + Math.random() * 22}px)`;
            foliageLayer.appendChild(breath);
        }

        // 2. هندسة بتلات عباد الشمس بكثافة فائقة (طبقتين متداخلتين وعشوائية حية لمحاكاة أزهار صورتك الطبيعية)
        const petalGroups = document.querySelectorAll('.petals-group');
        const totalPetals = 22; // زيادة الكثافة لجعل الزهرة غنية وثقيلة ومثالية

        petalGroups.forEach(group => {
            for (let i = 0; i < totalPetals; i++) {
                const angle = (360 / totalPetals) * i;
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                // حساب العشوائية لتبدو الأوراق طبيعية ونامية بشكل حيوي وغير منتظم تماثلاً مع الصورة
                const randomHeight = 44 + (Math.sin(i * 1.7) * 4.5);
                const tilt = 16 + (i % 2 * 8) + (Math.cos(i * 2.3) * 3.5); 
                const zOffset = (i % 2 === 0) ? 2 : 6;
                
                petal.style.height = `${randomHeight}px`;
                petal.style.transform = `rotateZ(${angle}deg) rotateX(${tilt}deg) translateZ(${zOffset}px)`;
                group.appendChild(petal);
            }
        });

        function openGift() {
            const giftBox = document.getElementById('giftBox');
            const actionBtn = document.getElementById('actionBtn');
            const boxLabel = document.getElementById('boxLabel');
            const seaAudio = document.getElementById('seaAudio');

            if (seaAudio) {
                seaAudio.volume = 0.45;
                seaAudio.play().catch(e => console.log("المتصفحات تتطلب تفاعلاً لبدء الصوت"));
            }

            giftBox.classList.add('open');
            boxLabel.style.opacity = '0';
            createSparkles();

            actionBtn.style.opacity = '0';
            setTimeout(() => { actionBtn.style.display = 'none'; }, 500);
        }

        function bloom3DBouquet() {
            const mainCard = document.getElementById('mainCard');
            const bouquet3D = document.getElementById('bouquet3D');
            const hintBtn = document.getElementById('hintBtn');

            hintBtn.style.display = 'none';
            mainCard.classList.add('shift-aside'); // ينسحب الكارد تماماً لليسار والأعماق الخلفية بسلام وبدون أي تداخل

            setTimeout(() => {
                bouquet3D.classList.add('bloom');
                createSparkles();
            }, 300);
        }

        function createSparkles() {
            const scene = document.querySelector('.scene');
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    particle.innerHTML = '✨';
                    particle.style.left = `calc(50% + ${Math.random() * 120 - 60}px)`;
                    particle.style.top = '40%';
                    scene.appendChild(particle);
                    setTimeout(() => { particle.remove(); }, 2300);
                }, i * 60);
            }
        }
    </script>
</body>
</html>
