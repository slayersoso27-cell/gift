<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لكِ</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8010;
            --bg-color: #0b0907;
            --box-color: #f7f3e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #241c11 0%, #0b0907 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* حاوية الهاتف الذكي لضمان التوافق */
        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        /* العنوان العلوي */
        .header-title {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 8px 30px;
            border-radius: 4px;
            font-size: 1.2rem;
            color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            background: rgba(11, 9, 7, 0.6);
            z-index: 10;
        }

        /* مسرح الحركة */
        .scene {
            position: relative;
            width: 100%;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* باقة الورد في الخلفية */
        .sunflowers-bg {
            position: absolute;
            bottom: -20px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #ffd700 10%, transparent 60%);
            opacity: 0;
            filter: blur(20px);
            transition: all 2s ease;
            z-index: 1;
            pointer-events: none;
        }
        
        /* شكل تمثيلي لباقة عباد الشمس عند اكتمال التحريك */
        .sunflowers-bg.show {
            opacity: 0.35;
            filter: blur(5px);
            transform: scale(1.2);
        }

        /* صندوق الهدايا */
        .gift-box {
            position: relative;
            width: 200px;
            height: 180px;
            background-color: var(--box-color);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,0,0,0.1);
            border: 2px solid #e0dacb;
            z-index: 4;
            transition: transform 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شريطة الهدية الذهبية */
        .gift-box::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
            top: 0;
            left: calc(50% - 15px);
            z-index: 2;
        }

        /* غطاء الصندوق */
        .gift-lid {
            position: absolute;
            top: -15px;
            left: -5px;
            width: 210px;
            height: 40px;
            background-color: var(--box-color);
            border: 2px solid #e0dacb;
            border-radius: 4px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            z-index: 5;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* شريطة الغطاء والفيونكة */
        .gift-lid::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
            left: calc(50% - 15px);
        }

        /* الفيونكة الذهبية */
        .ribbon-bow {
            position: absolute;
            top: -25px;
            left: calc(50% - 25px);
            width: 50px;
            height: 25px;
            background: var(--gold);
            border-radius: 50px 50px 0 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* لوحة الاسم الخارجية على الصندوق */
        .box-plate {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #fffcf6, #ebdcb9);
            border: 2px solid var(--gold);
            padding: 5px 20px;
            border-radius: 4px;
            color: #4a3611;
            font-weight: bold;
            text-align: center;
            z-index: 3;
            font-size: 0.9rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .box-plate span {
            display: block;
            font-size: 1.1rem;
            color: var(--dark-gold);
            margin-top: 2px;
        }

        /* تأثير فتح الصندوق */
        .gift-box.open .gift-lid {
            transform: translateY(-120px) rotate(-15px) scale(0.8);
            opacity: 0;
        }

        /* البطاقة الداخلية الفخمة */
        .card {
            position: absolute;
            width: 170px;
            height: 220px;
            background: linear-gradient(135deg, #fffdf9 0%, #f3ede0 100%);
            border: 3px double var(--gold);
            border-radius: 8px;
            color: #3a2e16;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 3;
            transform: translateY(20px) scale(0.8);
            opacity: 0;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
        }

        /* تحريك خروج البطاقة لأعلا */
        .gift-box.open .card {
            transform: translateY(-90px) scale(1.15);
            opacity: 1;
            z-index: 6;
        }

        .card h2 {
            font-size: 1.6rem;
            color: var(--dark-gold);
            margin-bottom: 10px;
            position: relative;
        }

        .card p {
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 600;
            color: #4a3f2c;
        }

        .card-heart {
            color: var(--gold);
            font-size: 1.2rem;
            margin: 5px 0;
        }

        /* زر التفاعل الأساسي */
        .action-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* الجزيئات المضيئة (القلوب الذهبية) */
        .particle {
            position: absolute;
            color: var(--gold);
            font-size: 1.5rem;
            pointer-events: none;
            opacity: 0;
            z-index: 7;
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-200px) scale(1.3) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- عنوان علوي فخم -->
        <div class="header-title">هدية خاصة لكِ</div>

        <!-- مسرح العرض والحركة -->
        <div class="scene">
            <!-- الورد في الخلفية -->
            <div class="sunflowers-bg" id="sunflowers">🌻🌻🌻</div>

            <!-- الصندوق -->
            <div class="gift-box" id="giftBox">
                <div class="gift-lid">
                    <div class="ribbon-bow"></div>
                </div>
                
                <!-- لوحة الاسم الخارجية -->
                <div class="box-plate" id="boxPlate">
                    هدية لـ
                    <span>بيسان</span>
                </div>

                <!-- البطاقة المخفية بالداخل -->
                <div class="card">
                    <div class="card-heart">♥</div>
                    <h2>بيسان</h2>
                    <p>بتستاهلي كل الورد<br>يا ألطف المخلوقين</p>
                    <div class="card-heart" style="margin-top: 10px;">♥</div>
                </div>
            </div>
        </div>

        <!-- زر التشغيل والتفاعل -->
        <button class="action-btn" id="actionBtn" onclick="openGift()">افتح الهدية 🎁</button>
    </div>

    <script>
        function openGift() {
            const giftBox = document.getElementById('giftBox');
            const actionBtn = document.getElementById('actionBtn');
            const sunflowers = document.getElementById('sunflowers');
            const boxPlate = document.getElementById('boxPlate');

            // 1. تشغيل أنيميشن الصندوق والغطاء
            giftBox.classList.add('open');
            
            // إخفاء اللوحة الخارجية بعد الفتح مباشرة
            setTimeout(() => {
                boxPlate.style.opacity = '0';
            }, 300);

            // 2. إطلاق تأثير القلوب المضيئة الفخمة
            createHeartParticles();

            // 3. إظهار باقة الورد في الخلفية بتأثير سينمائي بعد ثانية
            setTimeout(() => {
                sunflowers.classList.add('show');
            }, 800);

            // 4. تغيير نص الزر أو إخفاؤه
            actionBtn.style.opacity = '0';
            setTimeout(() => {
                actionBtn.style.display = 'none';
            }, 500);
        }

        function createHeartParticles() {
            const scene = document.querySelector('.scene');
            // توليد 15 قلب مضيء بشكل متتالي ومتفاوت
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('particle');
                    heart.innerHTML = '✨'; // يمكن تغييرها لـ '♥' أو '✨' لمزيج فخم
                    if(i % 2 === 0) heart.innerHTML = '♥';
                    
                    // توزيع عشوائي طفيف حول مركز الصندوق
                    heart.style.left = `calc(50% - 10px + ${Math.random() * 60 - 30}px)`;
                    heart.style.top = '40%';
                    heart.style.animationDelay = `${Math.random() * 0.4}s`;
                    
                    scene.appendChild(heart);

                    // تنظيف الصفحة بحذف العناصر بعد انتهاء حركتها
                    setTimeout(() => {
                        heart.remove();
                    }, 2000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
