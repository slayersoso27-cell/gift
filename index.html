<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Gift</title>

<style>
body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top,#0b0b1a,#000);
font-family: Arial;
color:white;
}

/* canvas stars */
canvas{
position:absolute;
top:0;
left:0;
}

/* scene */
.scene{
perspective:1400px;
z-index:2;
}

.card{
width:300px;
height:400px;
transform-style:preserve-3d;
transition:1.5s;
cursor:pointer;
position:relative;
}

.card.open{
transform: rotateY(180deg) scale(1.08);
}

/* sides */
.side{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:22px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

/* front */
.front{
background: linear-gradient(135deg,#ffe29f,#ff9671);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.front h2{
color:#222;
}

/* back */
.back{
transform:rotateY(180deg);
background: linear-gradient(135deg,#141e30,#243b55);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}

.heart{
font-size:55px;
animation: float 2s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.btn{
margin-top:15px;
padding:10px 18px;
border:none;
border-radius:12px;
background:#ffd36e;
cursor:pointer;
font-weight:bold;
}

/* bouquet */
.bouquet{
position:absolute;
bottom:-200px;
opacity:0;
transition:1.2s;
font-size:80px;
}

.bouquet.show{
bottom:30px;
opacity:1;
}

/* typing text */
#text{
margin-top:10px;
min-height:40px;
}

/* glow */
.glow{
text-shadow:0 0 10px #ffd36e;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="scene">
<div class="card" id="card">

<div class="side front">
<h2>🎁 اضغط لفتح الهدية</h2>
</div>

<div class="side back">
<div class="heart">💛</div>

<h3 class="glow">بيسان</h3>

<div id="text"></div>

<button class="btn" onclick="showBouquet(event)">مفاجأة 🌻</button>

<div class="bouquet" id="bouquet">🌻🌻💐🌻🌻</div>
</div>

</div>
</div>

<script>

/* ====== CARD OPEN ====== */
const card = document.getElementById("card");

card.addEventListener("click", ()=>{
card.classList.add("open");
startMusic();
typeText();
});

/* ====== TYPEWRITER ====== */
const message = "يا ألطف المخلوقات 💛\nإنتِ تستاهلي كل الورود في هذا العالم 🌻";
let i = 0;

function typeText(){
const el = document.getElementById("text");
el.innerHTML = "";

i = 0;
let interval = setInterval(()=>{
if(i < message.length){
el.innerHTML += message[i] === "\n" ? "<br>" : message[i];
i++;
}else{
clearInterval(interval);
}
},60);
}

/* ====== BOUQUET ====== */
function showBouquet(e){
e.stopPropagation();
document.getElementById("bouquet").classList.add("show");
}

/* ====== ROMANTIC MUSIC (Web Audio) ====== */
let audioStarted = false;

function startMusic(){
if(audioStarted) return;
audioStarted = true;

const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctx = new AudioContext();

function note(freq, time){
const osc = ctx.createOscillator();
const gain = ctx.createGain();

osc.type = "sine";
osc.frequency.value = freq;

gain.gain.setValueAtTime(0.0001, time);
gain.gain.exponentialRampToValueAtTime(0.08, time+0.5);
gain.gain.exponentialRampToValueAtTime(0.0001, time+2);

osc.connect(gain);
gain.connect(ctx.destination);

osc.start(time);
osc.stop(time+2);
}

const now = ctx.currentTime;

// simple romantic progression
note(261.6, now);      // C
note(329.6, now+1);    // E
note(392.0, now+2);    // G
note(523.3, now+3);    // C

note(493.9, now+4);    // B
note(392.0, now+5);    // G
note(329.6, now+6);    // E
}

/* ====== STARS BACKGROUND ====== */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array(120).fill().map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y += s.d;
if(s.y > canvas.height){
s.y = 0;
s.x = Math.random()*canvas.width;
}
}

requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", ()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

</script>

</body>
</html>
