<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لكِ</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8010;
            --bg-color: #0b0907;
            --box-color: #f7f3e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #241c11 0%, #0b0907 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        .header-title {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 8px 30px;
            border-radius: 4px;
            font-size: 1.2rem;
            color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            background: rgba(11, 9, 7, 0.6);
            z-index: 10;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* باقة الورد الحقيقية الفخمة في الخلفية */
        .sunflowers-image-bg {
            position: absolute;
            bottom: -30px;
            width: 320px;
            height: 320px;
            /* صورة حقيقية عالية الجودة لباقة عباد الشمس الأصفر الفاخر */
            background-image: url('https://images.unsplash.com/photo-1597848212624-a19eb35e2651?q=80&w=600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            opacity: 0;
            filter: blur(30px);
            transition: all 2.8s cubic-bezier(0.075, 0.82, 0.165, 1);
            z-index: 1;
            pointer-events: none;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
        }
        
        /* تأثير ظهور الباقة السينمائي المدمج خلف الكارد */
        .sunflowers-image-bg.show {
            opacity: 0.45;
            filter: blur(6px);
            transform: scale(1.25) translateY(-40px);
        }

        .gift-box {
            position: relative;
            width: 200px;
            height: 180px;
            background-color: var(--box-color);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,0,0,0.1);
            border: 2px solid #e0dacb;
            z-index: 4;
            transition: transform 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gift-box::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
            top: 0;
            left: calc(50% - 15px);
            z-index: 2;
        }

        .gift-lid {
            position: absolute;
            top: -15px;
            left: -5px;
            width: 210px;
            height: 40px;
            background-color: var(--box-color);
            border: 2px solid #e0dacb;
            border-radius: 4px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            z-index: 5;
            transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .gift-lid::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
            left: calc(50% - 15px);
        }

        .ribbon-bow {
            position: absolute;
            top: -25px;
            left: calc(50% - 25px);
            width: 50px;
            height: 25px;
            background: var(--gold);
            border-radius: 50px 50px 0 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .box-plate {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #fffcf6, #ebdcb9);
            border: 2px solid var(--gold);
            padding: 5px 20px;
            border-radius: 4px;
            color: #4a3611;
            font-weight: bold;
            text-align: center;
            z-index: 3;
            font-size: 0.9rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: opacity 0.5s ease;
        }
        
        .box-plate span {
            display: block;
            font-size: 1.2rem;
            color: var(--dark-gold);
            margin-top: 2px;
        }

        .gift-box.open .gift-lid {
            transform: translateY(-150px) rotate(-20deg) scale(0.7);
            opacity: 0;
        }

        /* الكارد المنسق الفخم */
        .card {
            position: absolute;
            width: 180px;
            height: 240px;
            background: linear-gradient(135deg, #fffdf9 0%, #f3ede0 100%);
            border: 3px double var(--gold);
            border-radius: 8px;
            color: #3a2e16;
            padding: 20px 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 3;
            transform: translateY(10px) scale(0.7);
            opacity: 0;
            transition: all 1.8s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
        }

        .gift-box.open .card {
            transform: translateY(-100px) scale(1.2);
            opacity: 1;
            z-index: 6;
        }

        .card h2 {
            font-size: 1.8rem;
            color: var(--dark-gold);
            font-weight: bold;
        }

        .card p {
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 600;
            color: #4a3f2c;
            direction: rtl;
        }

        .card-heart {
            color: var(--gold);
            font-size: 1.4rem;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none;
            padding: 14px 45px;
            border-radius: 30px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
            transition: all 0.4s ease;
            z-index: 10;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .particle {
            position: absolute;
            color: var(--gold);
            font-size: 1.5rem;
            pointer-events: none;
            opacity: 0;
            z-index: 7;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
            animation: floatUp 2.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.4) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            100% {
                transform: translateY(-250px) scale(1.4) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- موسيقى هادئة جداً ورومانسية تعمل عند الضغط -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="phone-container">
        <div class="header-title">هدية خاصة لكِ</div>

        <div class="scene">
            <!-- باقة الورد الحقيقية بالخلفية -->
            <div class="sunflowers-image-bg" id="sunflowers"></div>

            <div class="gift-box" id="giftBox">
                <div class="gift-lid">
                    <div class="ribbon-bow"></div>
                </div>
                
                <div class="box-plate" id="boxPlate">
                    هدية لـ
                    <span>بيسان</span>
                </div>

                <!-- الكارد بالعبارة المحددة بالكامل -->
                <div class="card">
                    <div class="card-heart">♥</div>
                    <h2>بيسان</h2>
                    <p>بتستاهلي كل الورد<br>يا ألطف المخلوقين</p>
                    <div class="card-heart">♥</div>
                </div>
            </div>
        </div>

        <button class="action-btn" id="actionBtn" onclick="openGift()">افتح الهدية 🎁</button>
    </div>

    <script>
        function openGift() {
            const giftBox = document.getElementById('giftBox');
            const actionBtn = document.getElementById('actionBtn');
            const sunflowers = document.getElementById('sunflowers');
            const boxPlate = document.getElementById('boxPlate');
            const music = document.getElementById('bgMusic');

            // 1. تشغيل الموسيقى الهادئة فوراً
            if (music) {
                music.volume = 0.35; 
                music.play().catch(error => console.log("المتصفح منع التشغيل التلقائي:", error));
            }

            // 2. تفعيل تحريك الصندوق والغطاء واللوحة
            giftBox.classList.add('open');
            boxPlate.style.opacity = '0';

            // 3. إطلاق جزيئات البريق والقلوب الذهبية المتطايرة (Particles)
            createHeartParticles();

            // 4. إظهار باقة الورد الفخمة في الخلفية بعمق سينمائي ناعم
            setTimeout(() => {
                sunflowers.classList.add('show');
            }, 500);

            // 5. إخفاء زر التفاعل بسلاسة
            actionBtn.style.opacity = '0';
            setTimeout(() => {
                actionBtn.style.display = 'none';
            }, 500);
        }

        function createHeartParticles() {
            const scene = document.querySelector('.scene');
            for (let i = 0; i < 22; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    // تنويع الأشكال لتعطي تأثيراً ساحراً
                    particle.innerHTML = i % 2 === 0 ? '♥' : '✨';
                    
                    particle.style.left = `calc(50% - 10px + ${Math.random() * 80 - 40}px)`;
                    particle.style.top = '45%';
                    particle.style.animationDelay = `${Math.random() * 0.3}s`;
                    
                    scene.appendChild(particle);

                    setTimeout(() => {
                        particle.remove();
                    }, 2500);
                }, i * 75);
            }
        }
    </script>
</body>
</html>
