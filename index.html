<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لكِ</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8010;
            --bg-color: #0b0907;
            --box-color: #f7f3e9;
            --petal-color: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a140d 0%, #050403 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            perspective: 1000px; /* لتمكين البُعد الثالث في الصفحة */
        }

        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            overflow: hidden;
        }

        .header-title {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 8px 35px;
            border-radius: 4px;
            font-size: 1.2rem;
            color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            background: rgba(11, 9, 7, 0.8);
            z-index: 10;
            letter-spacing: 1px;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transform-style: preserve-3d;
        }

        /* الصندوق الفخم */
        .gift-box {
            position: relative;
            width: 250px;
            height: 220px;
            background-color: var(--box-color);
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.85), inset 0 0 25px rgba(0,0,0,0.15);
            border: 2px solid #e0dacb;
            z-index: 4;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateY(40px);
            transition: transform 0.8s ease;
            transform-style: preserve-3d;
        }

        .gift-box::before {
            content: '';
            position: absolute;
            width: 36px;
            height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
            top: 0;
            left: calc(50% - 18px);
            z-index: 2;
        }

        .gift-lid {
            position: absolute;
            top: -18px;
            left: -6px;
            width: 262px;
            height: 45px;
            background-color: var(--box-color);
            border: 2px solid #e0dacb;
            border-radius: 4px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            z-index: 5;
            transition: all 1.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .gift-lid::before {
            content: '';
            position: absolute;
            width: 36px;
            height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
            left: calc(50% - 18px);
        }

        .ribbon-bow {
            position: absolute;
            top: -30px;
            left: calc(50% - 30px);
            width: 60px;
            height: 30px;
            background: var(--gold);
            border-radius: 60px 60px 0 0;
        }

        .box-plate {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #fffcf6, #ebdcb9);
            border: 2px solid var(--gold);
            padding: 6px 25px;
            border-radius: 4px;
            color: #4a3611;
            font-weight: bold;
            text-align: center;
            z-index: 3;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: opacity 0.4s ease;
        }
        
        .box-plate span {
            display: block;
            font-size: 1.3rem;
            color: var(--dark-gold);
            margin-top: 2px;
        }

        .gift-box.open .gift-lid {
            transform: translateY(-180px) rotateX(45deg) rotateZ(-20deg) scale(0.5);
            opacity: 0;
        }

        /* الكارد الفخم المنبثق أولاً */
        .card {
            position: absolute;
            width: 220px;
            height: 290px;
            background: linear-gradient(135deg, #fffdf9 0%, #f3ede0 100%);
            border: 3px double var(--gold);
            border-radius: 8px;
            color: #3a2e16;
            padding: 25px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 45px rgba(0,0,0,0.6);
            z-index: 6;
            transform: translateY(40px) scale(0.3) rotateY(90deg);
            opacity: 0;
            transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
            transform-style: preserve-3d;
        }

        /* الانبثاق ثلاثي الأبعاد المذهل */
        .gift-box.open .card {
            transform: translateY(-110px) scale(1.1) rotateY(0deg);
            opacity: 1;
            pointer-events: auto;
        }

        /* تنحي الكارد جانباً بزاوية مائلة */
        .card.shift-aside {
            transform: translateY(-90px) translateX(-75px) scale(0.8) rotateY(-15px) rotateZ(-5deg) !important;
            z-index: 5;
        }

        .card h2 {
            font-size: 2rem;
            color: var(--dark-gold);
            font-weight: bold;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }

        .card p {
            font-size: 1.1rem;
            line-height: 1.7;
            font-weight: 600;
            color: #4a3f2c;
        }

        .card-heart {
            color: var(--gold);
            font-size: 1.5rem;
        }

        /* --- مجسم زهرة عباد الشمس ثلاثية الأبعاد ثلاثي الفخامة (3D Pure CSS Flower) --- */
        .sunflower-3d {
            position: absolute;
            bottom: 40px;
            width: 160px;
            height: 160px;
            z-index: 3;
            opacity: 0;
            transform: scale(0.1) translateY(100px) rotateX(60deg);
            transform-style: preserve-3d;
            transition: all 2.2s cubic-bezier(0.075, 0.82, 0.165, 1);
            pointer-events: none;
        }

        /* انطلاق وجلب الوردة ثلاثية الأبعاد لأعلى المعرض */
        .sunflower-3d.bloom {
            opacity: 1;
            transform: scale(1.3) translateY(-130px) translateX(65px) rotateX(25deg) rotateY(-15deg);
            z-index: 7;
            animation: slowFloat 4s infinite ease-in-out alternate;
        }

        @keyframes slowFloat {
            0% { transform: scale(1.3) translateY(-130px) translateX(65px) rotateX(25deg) rotateY(-15deg); }
            100% { transform: scale(1.35) translateY(-140px) translateX(68px) rotateX(30deg) rotateY(-5deg); }
        }

        /* قلب الوردة البني الداكن المخملي */
        .flower-center {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #2b1a08 0%, #140c04 100%);
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.8);
            z-index: 10;
            transform: translateZ(20px); /* دفع القلب للأمام ليعطي عمق عميق */
        }

        /* حاوية البتلات المتداخلة */
        .petals-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .petal {
            position: absolute;
            top: 10px;
            left: 65px;
            width: 30px;
            height: 70px;
            background: linear-gradient(to bottom, #ffdb1a, #e69d00);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform-origin: center bottom;
        }

        /* زر الإشارة اللطيفة التفاعلية النابضة */
        .hint-touch-btn {
            position: absolute;
            bottom: -25px;
            background: #fff;
            color: var(--dark-gold);
            border: 1px solid var(--gold);
            padding: 7px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s ease;
            animation: pulseHint 1.8s infinite ease-in-out;
        }

        .gift-box.open .hint-touch-btn {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes pulseHint {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); }
            50% { transform: scale(1.06); box-shadow: 0 0 15px 8px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .action-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            transition: all 0.4s ease;
            z-index: 10;
        }

        /* الجزيئات البراقة والقلوب اللامعة */
        .particle {
            position: absolute;
            color: var(--gold);
            font-size: 1.5rem;
            pointer-events: none;
            opacity: 0;
            z-index: 8;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.9);
            animation: floatUp 2.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.4) rotateZ(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-260px) scale(1.5) rotateZ(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- نغمة أمواج بحر وبيانو هادئة جداً، انسيابية وناعمة للغاية تفوق الوصف جديّة ورومانسية -->
    <audio id="bgMusic" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-200.wav" type="audio/wav">
    </audio>

    <div class="phone-container">
        <div class="header-title">هدية خاصة لكِ</div>

        <div class="scene">
            <div class="gift-box" id="giftBox">
                <div class="gift-lid">
                    <div class="ribbon-bow"></div>
                </div>
                
                <div class="box-plate" id="boxPlate">
                    هدية لـ
                    <span>بيسان</span>
                </div>

                <!-- الكارد الذي ينبثق أولاً بتأثير ثلاثي الأبعاد -->
                <div class="card" id="mainCard" onclick="bloom3DFlower()">
                    <div class="card-heart">♥</div>
                    <h2>بيسان</h2>
                    <p>بتستاهلي كل الورد<br>يا ألطف المخلوقين</p>
                    <div class="card-heart">♥</div>
                    
                    <div class="hint-touch-btn" id="hintBtn">اضغطي لتأمل المفاجأة 🌊</div>
                </div>

                <!-- زهرة عباد الشمس المجسمة ثلاثية الأبعاد المبتكرة بالكامل بالداخل -->
                <div class="sunflower-3d" id="flower3D">
                    <div class="flower-center"></div>
                    <div class="petals-container" id="petalsList"></div>
                </div>
            </div>
        </div>

        <button class="action-btn" id="actionBtn" onclick="openGift()">افتح الهدية 🎁</button>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        // نغمة أمواج البحر والبيانو الجادة والناعمة للغاية
        music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"; 

        // توليد بتلات الوردة بشكل دائري ثلاثي الأبعاد متداخل عند تحميل الصفحة
        const petalsList = document.getElementById('petalsList');
        const totalPetals = 24; // عدد البتلات الكثيف لتعطي مجسم حقيقي فخم
        for (let i = 0; i < totalPetals; i++) {
            const angle = (360 / totalPetals) * i;
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            // ترتيب البتلات في فضاء الـ 3D وتناوب إمالتها للخارج قليلاً لتبدو طبيعية ومتفتحة
            const randomTilt = 20 + (i % 2 * 8); // تداخل البتلات في طبقتين
            const translateZ = i % 2 === 0 ? 5 : 12; 
            
            petal.style.transform = `rotateZ(${angle}deg) rotateX(${randomTilt}deg) translateZ(${translateZ}px)`;
            petalsList.appendChild(petal);
        }

        function openGift() {
            const giftBox = document.getElementById('giftBox');
            const actionBtn = document.getElementById('actionBtn');
            const boxPlate = document.getElementById('boxPlate');

            if (music) {
                music.volume = 0.2; // خافتة وناعمة جداً لتكون خلفية راقية كأصوات الطبيعة والبيانو
                music.play().catch(err => console.log("تطلب تفاعل مستخدم مسبق"));
            }

            giftBox.classList.add('open');
            boxPlate.style.opacity = '0';

            createGoldMagic();

            actionBtn.style.opacity = '0';
            setTimeout(() => { actionBtn.style.display = 'none'; }, 500);
        }

        // تفاعل تفتح وصعود المجسم ثلاثي الأبعاد الفخم من عمق الصندوق
        function bloom3DFlower() {
            const mainCard = document.getElementById('mainCard');
            const flower3D = document.getElementById('flower3D');
            const hintBtn = document.getElementById('hintBtn');

            hintBtn.style.display = 'none';
            mainCard.classList.add('shift-aside');

            setTimeout(() => {
                flower3D.classList.add('bloom');
                // إطلاق بريق إضافي فخم أثناء الصعود
                createGoldMagic();
            }, 300);
        }

        function createGoldMagic() {
            const scene = document.querySelector('.scene');
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    particle.innerHTML = i % 2 === 0 ? '♥' : '✨';
                    
                    particle.style.left = `calc(50% - 10px + ${Math.random() * 120 - 60}px)`;
                    particle.style.top = '50%';
                    particle.style.animationDelay = `${Math.random() * 0.3}s`;
                    
                    scene.appendChild(particle);
                    setTimeout(() => { particle.remove(); }, 2500);
                }, i * 60);
            }
        }
    </script>
</body>
</html>
