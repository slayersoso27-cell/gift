<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لبيسان</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8010;
            --bg-color: #0c0a07;
            --box-color: #f5f0e6;
            --box-inner: #ebdcb9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1f170f 0%, #050403 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            perspective: 1200px; /* منظور عميق ثلاثي الأبعاد للمشهد بالكامل */
        }

        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            overflow: hidden;
        }

        .header-title {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 8px 35px;
            border-radius: 4px;
            font-size: 1.1rem;
            color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
            background: rgba(12, 10, 7, 0.85);
            z-index: 100;
            letter-spacing: 1px;
        }

        /* المسرح ثلاثي الأبعاد */
        .scene {
            position: relative;
            width: 100%;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transform-style: preserve-3d;
            transform: rotateX(10deg); /* إمالة المسرح قليلاً لرؤية مجسم الصندوق */
        }

        /* ================= صندق الهدايا ثلاثي الأبعاد الحقيقي ================= */
        .gift-box-3d {
            position: relative;
            width: 200px;
            height: 180px;
            transform-style: preserve-3d;
            transform: translateY(60px) rotateY(-15deg);
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        /* الجوانب الستة للصندوق ثلاثي الأبعاد */
        .box-face {
            position: absolute;
            background-color: var(--box-color);
            border: 1.5px solid #ebdcb9;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .box-face.front  { width: 200px; height: 180px; transform: translateZ(100px); }
        .box-face.back   { width: 200px; height: 180px; transform: rotateY(180deg) translateZ(100px); background: #eae3d2; }
        .box-face.left   { width: 200px; height: 180px; transform: rotateY(-90deg) translateZ(100px); background: #e3dac6; }
        .box-face.right  { width: 200px; height: 180px; transform: rotateY(90deg) translateZ(100px); background: #eee7d7; }
        .box-face.bottom { width: 200px; height: 200px; transform: rotateX(-90deg) translateZ(90px); background: #d7cdb4; box-shadow: 0 30px 50px rgba(0,0,0,0.7); }
        
        /* أشرطة الزينة الذهبية حول مجسم الصندوق */
        .ribbon-v {
            position: absolute;
            top: 0; left: calc(50% - 15px); width: 30px; height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
        }

        /* غطاء الصندوق ثلاثي الأبعاد المنفصل */
        .lid-3d {
            position: absolute;
            width: 212px;
            height: 35px;
            top: -20px;
            left: -6px;
            transform-style: preserve-3d;
            transform-origin: center back;
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s ease;
            z-index: 15;
        }

        .lid-face {
            position: absolute;
            background-color: var(--box-color);
            border: 1px solid #ebdcb9;
        }
        .lid-face.top    { width: 212px; height: 212px; transform: rotateX(90deg) translateZ(106px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .lid-face.front  { width: 212px; height: 35px; transform: translateZ(106px); }
        .lid-face.back   { width: 212px; height: 35px; transform: rotateY(180deg) translateZ(106px); }
        .lid-face.left   { width: 212px; height: 35px; transform: rotateY(-90deg) translateZ(106px); }
        .lid-face.right  { width: 212px; height: 35px; transform: rotateY(90deg) translateZ(106px); }

        .lid-ribbon {
            position: absolute;
            top: 0; left: calc(50% - 15px); width: 30px; height: 100%;
            background: var(--gold);
        }

        /* فتح الصندوق ثلاثي الأبعاد بشكل سينمائي */
        .gift-box-3d.open {
            transform: translateY(120px) rotateX(15deg) rotateY(20deg);
        }
        .gift-box-3d.open .lid-3d {
            transform: translateY(-150px) rotateX(-120deg) rotateZ(30deg) scale(0.8);
            opacity: 0;
        }

        /* لوحة الاسم الفخمة على واجهة الصندوق */
        .box-label {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #ffffff, #f7f1e1);
            border: 1.5px solid var(--gold);
            padding: 5px 20px; border-radius: 4px;
            color: #4a3611; font-weight: bold; text-align: center; font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .box-label span { display: block; font-size: 1.1rem; color: var(--dark-gold); }

        /* ================= الكارد الفخم والانبثاق أولاً ================= */
        .card {
            position: absolute;
            width: 220px;
            height: 290px;
            background: linear-gradient(135deg, #fffdfb 0%, #f6f0e2 100%);
            border: 3px double var(--gold);
            border-radius: 12px;
            color: #3a2e16;
            padding: 25px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 40; /* التأكد من أن الكارد في الأعلى تماماً ولا تخترقه أي عناصر */
            transform: translateY(50px) scale(0.2) rotateX(-90deg);
            opacity: 0;
            transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
            transform-style: preserve-3d;
        }

        /* انطلاق الكارد إلى الصدارة */
        .gift-box-3d.open .card {
            transform: translateY(-130px) scale(1.15) rotateX(0deg);
            opacity: 1;
            pointer-events: auto;
        }

        /* حركة تنحي الكارد الجانبية الذكية لمنع التداخل مع الورد */
        .card.shift-aside {
            transform: translateY(-120px) translateX(-85px) scale(0.85) rotateY(-20deg) rotateZ(-8deg) !important;
            box-shadow: -10px 20px 30px rgba(0,0,0,0.5);
        }

        .card h2 { font-size: 2.1rem; color: var(--dark-gold); font-weight: bold; }
        .card p { font-size: 1.1rem; line-height: 1.7; font-weight: 600; color: #4a3f2c; }
        .card-heart { color: var(--gold); font-size: 1.5rem; }

        /* ================= باقة الورد ثلاثية الأبعاد الفخمة المكونة من عدة وردات ================= */
        .bouquet-3d-container {
            position: absolute;
            bottom: 90px;
            width: 180px;
            height: 180px;
            z-index: 30; /* تكون بالخلف والوسط تماماً وتصعد بحرية */
            opacity: 0;
            transform: scale(0.1) translateY(150px) rotateY(0deg);
            transform-style: preserve-3d;
            transition: all 2.2s cubic-bezier(0.075, 0.82, 0.165, 1);
            pointer-events: none;
        }

        /* انبثاق الباقة المجسمة الكاملة للأعلى ودورانها الفخم */
        .bouquet-3d-container.bloom {
            opacity: 1;
            transform: scale(1.3) translateY(-140px) translateX(65px) rotateY(15deg);
            animation: bouquetFloat 5s infinite ease-in-out alternate;
        }

        @keyframes bouquetFloat {
            0% { transform: scale(1.3) translateY(-140px) translateX(65px) rotateY(10deg) rotateX(5deg); }
            100% { transform: scale(1.35) translateY(-150px) translateX(70px) rotateY(25deg) rotateX(-5deg); }
        }

        /* تصميم هيكل الزهرة الفردية ثلاثية الأبعاد */
        .single-flower-3d {
            position: absolute;
            transform-style: preserve-3d;
        }

        /* تنسيق وتوزيع الوردات داخل الباقة (أماكن مختلفة وعمق ثلاثي أبعاد) */
        .fl-1 { top: 30px; left: 30px; transform: scale(0.9) translateZ(10px); }
        .fl-2 { top: 0px; left: 65px; transform: scale(1) rotateX(10deg) translateZ(30px); }
        .fl-3 { top: 40px; left: 95px; transform: scale(0.85) rotateY(-15deg) translateZ(15px); }
        .fl-4 { top: 70px; left: 55px; transform: scale(0.95) rotateX(-10deg) translateZ(25px); }

        .flower-center {
            position: absolute;
            top: 25px; left: 25px; width: 40px; height: 40px;
            background: radial-gradient(circle, #2d1b07 0%, #120b03 100%);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,0,0,0.8);
            z-index: 10;
            transform: translateZ(10px);
        }

        .petals-group {
            position: relative;
            width: 90px;
            height: 90px;
            transform-style: preserve-3d;
        }

        .petal {
            position: absolute;
            top: 5px; left: 37px; width: 16px; height: 40px;
            background: linear-gradient(to bottom, #ffe033, #e69500);
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transform-origin: center bottom;
        }

        /* زر الإشارة اللطيفة النبضي */
        .hint-touch-btn {
            position: absolute;
            bottom: -25px;
            background: #ffffff;
            color: var(--dark-gold);
            border: 1px solid var(--gold);
            padding: 7px 22px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            cursor: pointer;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s ease;
            animation: pulseHint 1.8s infinite ease-in-out;
        }

        .gift-box-3d.open .hint-touch-btn { opacity: 1; transform: scale(1); }

        @keyframes pulseHint {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); }
            50% { transform: scale(1.06); box-shadow: 0 0 15px 8px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .action-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none;
            padding: 15px 55px;
            border-radius: 30px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.35);
            transition: all 0.4s ease;
            z-index: 110;
        }

        /* بريق وسحر ذهبي متطاير */
        .particle {
            position: absolute;
            color: var(--gold);
            font-size: 1.3rem;
            pointer-events: none;
            opacity: 0;
            z-index: 90;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
            animation: floatUp 2.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-280px) scale(1.4) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- صوت نقي وطبيعي لأمواج البحر الهادئة والناعمة جداً فقط بدون أي موسيقى مضافة -->
    <audio id="seaAudio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-200.wav" type="audio/wav">
    </audio>

    <div class="phone-container">
        <div class="header-title">هدية خاصة لكِ</div>

        <div class="scene">
            <!-- هيكل صندوق الهدايا ثلاثي الأبعاد بالكامل -->
            <div class="gift-box-3d" id="giftBox">
                <!-- غطاء الصندوق ثلاثي الأبعاد -->
                <div class="lid-3d">
                    <div class="lid-face top"><div class="lid-ribbon"></div></div>
                    <div class="lid-face front"><div class="lid-ribbon"></div></div>
                    <div class="lid-face back"><div class="lid-ribbon"></div></div>
                    <div class="lid-face left"></div>
                    <div class="lid-face right"></div>
                </div>

                <!-- أوجة الصندوق المكعبة المحيطة -->
                <div class="box-face front">
                    <div class="ribbon-v"></div>
                    <div class="box-label" id="boxLabel">هدية لـ<span>بيسان</span></div>
                </div>
                <div class="box-face back"><div class="ribbon-v"></div></div>
                <div class="box-face left"></div>
                <div class="box-face right"></div>
                <div class="box-face bottom"></div>

                <!-- كارد التهنئة المنبثق في الصدارة أولاً -->
                <div class="card" id="mainCard" onclick="bloom3DBouquet()">
                    <div class="card-heart">♥</div>
                    <h2>بيسان</h2>
                    <p>بتستاهلي كل الورد<br>يا ألطف المخلوقين</p>
                    <div class="card-heart">♥</div>
                    
                    <div class="hint-touch-btn" id="hintBtn">اضغطي لتأمل باقة الورد 🌊</div>
                </div>

                <!-- باقة الورد ثلاثية الأبعاد الفخمة (تحتوي على 4 وردات مجسمة متناسقة) -->
                <div class="bouquet-3d-container" id="bouquet3D">
                    <!-- الوردة الأولى -->
                    <div class="single-flower-3d fl-1">
                        <div class="flower-center"></div>
                        <div class="petals-group"></div>
                    </div>
                    <!-- الوردة الثانية (المركزية الكبرى) -->
                    <div class="single-flower-3d fl-2">
                        <div class="flower-center"></div>
                        <div class="petals-group"></div>
                    </div>
                    <!-- الوردة الثالثة -->
                    <div class="single-flower-3d fl-3">
                        <div class="flower-center"></div>
                        <div class="petals-group"></div>
                    </div>
                    <!-- الوردة الرابعة -->
                    <div class="single-flower-3d fl-4">
                        <div class="flower-center"></div>
                        <div class="petals-group"></div>
                    </div>
                </div>

            </div>
        </div>

        <button class="action-btn" id="actionBtn" onclick="openGift()">افتح الهدية 🎁</button>
    </div>

    <script>
        const seaAudio = document.getElementById('seaAudio');
        // رابط مباشر لصوت هدير موج البحر النقي والمريح للغاية
        seaAudio.src = "https://www.soundjay.com/nature/sounds/ocean-wave-1.mp3";

        // بناء بتلات الوردات الأربع مجسمة وتوزيعها دائرياً عند تحميل الصفحة
        const petalGroups = document.querySelectorAll('.petals-group');
        const petalsPerFlower = 18;

        petalGroups.forEach(group => {
            for (let i = 0; i < petalsPerFlower; i++) {
                const angle = (360 / petalsPerFlower) * i;
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                // إمالة البتلات في فضاء الـ 3D لتعطي شكل زهرة متفتحة حقيقية ولها عمق هندسي
                const tilt = 22 + (i % 2 * 6);
                const zOffset = i % 2 === 0 ? 3 : 7;
                
                petal.style.transform = `rotateZ(${angle}deg) rotateX(${tilt}deg) translateZ(${zOffset}px)`;
                group.appendChild(petal);
            }
        });

        function openGift() {
            const giftBox = document.getElementById('giftBox');
            const actionBtn = document.getElementById('actionBtn');
            const boxLabel = document.getElementById('boxLabel');

            // تشغيل صوت أمواج البحر بنعومة فائقة في الخلفية
            if (seaAudio) {
                seaAudio.volume = 0.4;
                seaAudio.play().catch(() => console.log("تفاعل المتصفح مطلوب للملفات الصوتية"));
            }

            // انطلاق أنيميشن فتح غطاء الصندوق الـ 3D وانبثاق الكارد الفخم فوراً
            giftBox.classList.add('open');
            boxLabel.style.opacity = '0';

            createMagicSparkles();

            actionBtn.style.opacity = '0';
            setTimeout(() => { actionBtn.style.display = 'none'; }, 500);
        }

        // الخطوة الثانية: تنحي الكارد وانبثاق باقة الورد المجسمة الفخمة بالكامل من عمق الصندوق
        function bloom3DBouquet() {
            const mainCard = document.getElementById('mainCard');
            const bouquet3D = document.getElementById('bouquet3D');
            const hintBtn = document.getElementById('hintBtn');

            hintBtn.style.display = 'none';
            mainCard.classList.add('shift-aside');

            // صعود باقة الورد المكونة من عدة زهرات من قلب الصندوق
            setTimeout(() => {
                bouquet3D.classList.add('bloom');
                createMagicSparkles();
            }, 400);
        }

        function createMagicSparkles() {
            const scene = document.querySelector('.scene');
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    particle.innerHTML = i % 2 === 0 ? '♥' : '✨';
                    
                    particle.style.left = `calc(50% - 10px + ${Math.random() * 140 - 70}px)`;
                    particle.style.top = '45%';
                    particle.style.animationDelay = `${Math.random() * 0.2}s`;
                    
                    scene.appendChild(particle);
                    setTimeout(() => { particle.remove(); }, 2500);
                }, i * 60);
            }
        }
    </script>
</body>
</html>
