<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>هدية بيسان</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #fff9e6, #ffe6f0);
      font-family: 'Scheherazade', serif;
    }
    .gift-box {
      width: 260px;
      height: 260px;
      background: url('https://i.ibb.co/6WfYw2b/gift-box.png') no-repeat center/cover;
      cursor: pointer;
      position: relative;
      animation: pulse 2s infinite;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      border-radius: 15px;
    }
    .press-indicator {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: ripple 1.5s infinite;
    }
    @keyframes ripple {
      0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.6); }
      100% { box-shadow: 0 0 0 25px rgba(255,215,0,0); }
    }
    .flowers, .card {
      display: none;
      text-align: center;
      animation: pop 1s ease-out forwards;
    }
    .flowers img {
      width: 140px;
      margin: 12px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }
    .card {
      margin-top: 20px;
      font-size: 26px;
      font-weight: bold;
      color: #d6336c;
      background: rgba(255,255,255,0.9);
      padding: 12px 18px;
      border-radius: 12px;
      display: inline-block;
      text-shadow: 2px 2px 6px rgba(255,215,0,0.6);
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="gift-box" onclick="openGift()">
    <div class="press-indicator"></div>
  </div>

  <div class="flowers" id="flowers">
    <img src="https://i.ibb.co/9rZfYw2/roses.png" alt="باقة ورد">
    <img src="https://i.ibb.co/7JfYw2b/sunflowers.png" alt="باقة عباد شمس">
    <div class="press-indicator"></div>
  </div>

  <div class="card" id="card">
    بتستاهلي كل الورود يا ألطف المخلوقين
  </div>

  <!-- موسيقى هادئة جدًا -->
  <audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a7b2f6f3d.mp3?filename=soft-piano-110997.mp3"></audio>

  <script>
    function openGift() {
      document.querySelector('.gift-box').style.display = 'none';
      document.getElementById('flowers').style.display = 'block';
    }
    document.getElementById('flowers').onclick = function() {
      document.getElementById('flowers').style.display = 'none';
      document.getElementById('card').style.display = 'block';
      document.getElementById('music').play();
    }
  </script>
</body>
</html>
