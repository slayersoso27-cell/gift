<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لبيسان</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8010;
            --bg-color: #0c0a07;
            --box-color: #f5f0e6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #221a12 0%, #050403 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px; /* ضبط عمق المنظور العام للمسرح */
        }

        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
        }

        .header-title {
            border: 1px solid var(--gold);
            padding: 8px 35px;
            border-radius: 4px;
            font-size: 1.1rem;
            color: var(--gold);
            background: rgba(12, 10, 7, 0.9);
            z-index: 100;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* مسرح الـ 3D المضبوط */
        .scene {
            position: relative;
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transform: rotateX(12deg) rotateY(-5deg); /* إمالة لطيفة لرؤية العمق الحقيقي */
            z-index: 10;
        }

        /* الصندوق ثلاثي الأبعاد هندسياً */
        .gift-box-3d {
            position: relative;
            width: 200px;
            height: 180px;
            transform-style: preserve-3d;
            transform: translateY(60px);
            transition: transform 1.5s ease-in-out;
        }

        .box-face {
            position: absolute;
            background-color: var(--box-color);
            border: 1px solid #e3dac6;
        }

        /* ضبط أسطح جسم الصندوق وعمقه */
        .box-face.front  { width: 200px; height: 180px; transform: translateZ(100px); }
        .box-face.back   { width: 200px; height: 180px; transform: rotateY(180deg) translateZ(100px); background: #eae3d2; }
        .box-face.left   { width: 200px; height: 180px; transform: rotateY(-90deg) translateZ(100px); background: #e3dac6; }
        .box-face.right  { width: 200px; height: 180px; transform: rotateY(90deg) translateZ(100px); background: #eee7d7; }
        .box-face.bottom { width: 200px; height: 200px; transform: rotateX(-90deg) translateZ(90px); background: #cdbfa0; box-shadow: 0 35px 50px rgba(0,0,0,0.8); }

        .ribbon-v {
            position: absolute;
            top: 0; left: calc(50% - 15px); width: 30px; height: 100%;
            background: linear-gradient(90deg, var(--dark-gold), var(--gold), var(--dark-gold));
        }

        /* تصحيح الغطاء تماماً ليفتح للأعلى وللخلف */
        .lid-3d {
            position: absolute;
            width: 208px;
            height: 35px;
            top: -2px; left: -4px;
            transform-style: preserve-3d;
            transform-origin: center top -100px; /* جعل المحور في الخلف بالأعلى */
            transition: transform 1.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 20;
        }

        .lid-face { position: absolute; background-color: var(--box-color); border: 1px solid #ebdcb9; }
        .lid-face.top    { width: 208px; height: 208px; transform: rotateX(90deg) translateZ(104px); }
        .lid-face.front  { width: 208px; height: 35px; transform: translateZ(104px); }
        .lid-face.back   { width: 208px; height: 35px; transform: rotateY(180deg) translateZ(104px); }
        .lid-face.left   { width: 208px; height: 35px; transform: rotateY(-90deg) translateZ(104px); }
        .lid-face.right  { width: 208px; height: 35px; transform: rotateY(90deg) translateZ(104px); }
        
        .lid-ribbon { position: absolute; top: 0; left: calc(50% - 15px); width: 30px; height: 100%; background: var(--gold); }

        /* أنيميشن الفتح الصحيح */
        .gift-box-3d.open .lid-3d {
            transform: rotateX(-110deg) translateY(-50px); /* يرتفع للأعلى ويقلب للخلف */
        }

        .box-label {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; border: 1.5px solid var(--gold);
            padding: 5px 20px; border-radius: 4px;
            color: #4a3611; font-weight: bold; text-align: center; font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: opacity 0.5s ease;
        }
        .box-label span { display: block; font-size: 1.1rem; color: var(--dark-gold); }

        /* كارد المفاجأة المنبثق أولاً */
        .card {
            position: absolute;
            width: 210px;
            height: 280px;
            background: linear-gradient(135deg, #fffdfa 0%, #f7f2e5 100%);
            border: 3px double var(--gold);
            border-radius: 12px;
            color: #3a2e16;
            padding: 25px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 50; /* فوق الصندوق تماماً */
            transform: translateZ(0px) translateY(20px) scale(0.1);
            opacity: 0;
            transition: all 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .gift-box-3d.open .card {
            transform: translateZ(120px) translateY(-140px) scale(1.1);
            opacity: 1;
            pointer-events: auto;
        }

        /* تنحي الكارد لليسار بنعومة عند طلب الورد */
        .card.shift-aside {
            transform: translateZ(80px) translateY(-120px) translateX(-90px) scale(0.85) rotateY(-15deg) !important;
        }

        .card h2 { font-size: 2rem; color: var(--dark-gold); font-weight: bold; }
        .card p { font-size: 1.05rem; line-height: 1.6; font-weight: 600; color: #4a3f2c; }
        .card-heart { color: var(--gold); font-size: 1.3rem; }

        /* باقة الورد ثلاثية الأبعاد الخارجة من قلب الصندوق */
        .bouquet-3d-container {
            position: absolute;
            top: 20px; left: 10px;
            width: 180px;
            height: 180px;
            z-index: 45; /* تتموضع بدقة خلف الكارد المنحني */
            opacity: 0;
            transform: translateZ(0px) translateY(0px) scale(0.2);
            transform-style: preserve-3d;
            transition: all 2s cubic-bezier(0.075, 0.82, 0.165, 1);
            pointer-events: none;
        }

        /* خروج الباقة واستقرارها أعلى الصندوق بجانب الكارد */
        .bouquet-3d-container.bloom {
            opacity: 1;
            transform: translateZ(60px) translateY(-140px) translateX(65px) scale(1.3);
            animation: bouquetFloat 4s infinite ease-in-out alternate;
        }

        @keyframes bouquetFloat {
            0% { transform: translateZ(60px) translateY(-140px) translateX(65px) scale(1.3) rotateY(5deg); }
            100% { transform: translateZ(60px) translateY(-148px) translateX(68px) scale(1.35) rotateY(18deg); }
        }

        /* تصميم الوردات المجسمة داخل الباقة */
        .single-flower-3d { position: absolute; transform-style: preserve-3d; }
        .fl-1 { top: 20px; left: 20px; transform: scale(0.85) translateZ(5px); }
        .fl-2 { top: -5px; left: 55px; transform: scale(1) rotateX(8deg) translateZ(25px); }
        .fl-3 { top: 35px; left: 90px; transform: scale(0.85) rotateY(-12deg) translateZ(10px); }
        .fl-4 { top: 65px; left: 50px; transform: scale(0.9) rotateX(-8deg) translateZ(20px); }

        .flower-center {
            position: absolute;
            top: 25px; left: 25px; width: 40px; height: 40px;
            background: radial-gradient(circle, #301c06 0%, #140c03 100%);
            border-radius: 50%;
            z-index: 10;
            transform: translateZ(8px);
            box-shadow: inset 0 0 6px #000;
        }

        .petals-group { position: relative; width: 90px; height: 90px; transform-style: preserve-3d; }
        
        .petal {
            position: absolute;
            top: 5px; left: 37px; width: 16px; height: 40px;
            background: linear-gradient(to bottom, #ffe033, #e69500);
            border-radius: 50% 50% 40% 40%;
            transform-origin: center bottom;
        }

        /* إشارة الضغط اللطيفة */
        .hint-touch-btn {
            position: absolute;
            bottom: -22px;
            background: #fff; color: var(--dark-gold);
            border: 1px solid var(--gold);
            padding: 6px 20px; border-radius: 20px;
            font-size: 0.85rem; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            opacity: 0; transform: scale(0);
            transition: all 0.5s ease;
            animation: pulseHint 1.8s infinite ease-in-out;
        }

        .gift-box-3d.open .hint-touch-btn { opacity: 1; transform: scale(1); }

        @keyframes pulseHint {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 12px 6px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .action-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none; padding: 15px 55px; border-radius: 30px;
            color: #fff; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            z-index: 110;
        }

        .particle {
            position: absolute; color: var(--gold); font-size: 1.3rem;
            pointer-events: none; opacity: 0; z-index: 90;
            animation: floatUp 2.3s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-250px) scale(1.3) rotate(180deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- تم تأمين رابط مباشر، قوي وصريح لصوت أمواج البحر الطبيعية المهدئة -->
    <audio id="seaAudio" loop preload="auto">
        <source src="https://www.soundjay.com/nature/sounds/ocean-wave-1.mp3" type="audio/mp3">
    </audio>

    <div class="phone-container">
        <div class="header-title">هدية خاصة لكِ</div>

        <div class="scene">
            <div class="gift-box-3d" id="giftBox">
                <!-- الغطاء المعدل هندسياً -->
                <div class="lid-3d">
                    <div class="lid-face top"><div class="lid-ribbon"></div></div>
                    <div class="lid-face front"><div class="lid-ribbon"></div></div>
                    <div class="lid-face back"><div class="lid-ribbon"></div></div>
                    <div class="lid-face left"></div>
                    <div class="lid-face right"></div>
                </div>

                <!-- جسم الصندوق -->
                <div class="box-face front">
                    <div class="ribbon-v"></div>
                    <div class="box-label" id="boxLabel">هدية لـ<span>بيسان</span></div>
                </div>
                <div class="box-face back"><div class="ribbon-v"></div></div>
                <div class="box-face left"></div>
                <div class="box-face right"></div>
                <div class="box-face bottom"></div>

                <!-- كارد التهنئة المنبثق بالصدارة -->
                <div class="card" id="mainCard" onclick="bloom3DBouquet()">
                    <div class="card-heart">♥</div>
                    <h2>بيسان</h2>
                    <p>بتستاهلي كل الورد<br>يا ألطف المخلوقين</p>
                    <div class="card-heart">♥</div>
                    <div class="hint-touch-btn" id="hintBtn">اضغطي لتأمل باقة الورد 🌊</div>
                </div>

                <!-- باقة الورد ثلاثية الأبعاد المرتبطة بداخل الصندوق -->
                <div class="bouquet-3d-container" id="bouquet3D">
                    <div class="single-flower-3d fl-1"><div class="flower-center"></div><div class="petals-group"></div></div>
                    <div class="single-flower-3d fl-2"><div class="flower-center"></div><div class="petals-group"></div></div>
                    <div class="single-flower-3d fl-3"><div class="flower-center"></div><div class="petals-group"></div></div>
                    <div class="single-flower-3d fl-4"><div class="flower-center"></div><div class="petals-group"></div></div>
                </div>

            </div>
        </div>

        <button class="action-btn" id="actionBtn" onclick="openGift()">افتح الهدية 🎁</button>
    </div>

    <script>
        // بناء البتلات هندسياً
        const petalGroups = document.querySelectorAll('.petals-group');
        petalGroups.forEach(group => {
            for (let i = 0; i < 16; i++) {
                const angle = (360 / 16) * i;
                const petal = document.createElement('div');
                petal.classList.add('petal');
                const tilt = 20 + (i % 2 * 6);
                petal.style.transform = `rotateZ(${angle}deg) rotateX(${tilt}deg)`;
                group.appendChild(petal);
            }
        });

        function openGift() {
            const giftBox = document.getElementById('giftBox');
            const actionBtn = document.getElementById('actionBtn');
            const boxLabel = document.getElementById('boxLabel');
            const seaAudio = document.getElementById('seaAudio');

            // تشغيل صوت موج البحر النقي فوراً وثيابياً
            if (seaAudio) {
                seaAudio.volume = 0.5;
                seaAudio.play().catch(e => console.log("تحتاج للتفاعل أولاً"));
            }

            giftBox.classList.add('open');
            boxLabel.style.opacity = '0';
            createSparkles();

            actionBtn.style.opacity = '0';
            setTimeout(() => { actionBtn.style.display = 'none'; }, 500);
        }

        function bloom3DBouquet() {
            const mainCard = document.getElementById('mainCard');
            const bouquet3D = document.getElementById('bouquet3D');
            const hintBtn = document.getElementById('hintBtn');

            hintBtn.style.display = 'none';
            mainCard.classList.add('shift-aside');

            setTimeout(() => {
                bouquet3D.classList.add('bloom');
                createSparkles();
            }, 300);
        }

        function createSparkles() {
            const scene = document.querySelector('.scene');
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    particle.innerHTML = '✨';
                    particle.style.left = `calc(50% + ${Math.random() * 120 - 60}px)`;
                    particle.style.top = '40%';
                    scene.appendChild(particle);
                    setTimeout(() => { particle.remove(); }, 2300);
                }, i * 60);
            }
        }
    </script>
</body>
</html>
